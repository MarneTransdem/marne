name: Site Verification & Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-app:
    name: Verify App (Site, CRM, Server)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Run verification checks (Audit, Smoke, Lint, Build)
        run: npm run check

  verify-functions:
    name: Verify Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: |
          cd functions
          npm ci

      - name: Typecheck and build functions
        run: |
          cd functions
          npm run build
